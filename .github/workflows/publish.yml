name: Publish book
on:
  push:
    branches: [v1.0]
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip the book
        run: |
          zip=$(ls *.zip 2>/dev/null | head -1)
          if [ -z "$zip" ]; then echo "no zip"; exit 0; fi
          unzip -o "$zip" -d .
          rm -f "$zip"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Unpack the book [skip ci]" || echo "nothing to commit"
          git push
