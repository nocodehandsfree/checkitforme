name: CI

# Gate the app on its own checks. Tests boot against dummy env + throwaway SQLite DBs — no real secrets.
on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  test:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Store contract (carries must be served-derived, not the raw column)
        run: node scripts/check-store-contract.mjs

      - name: Full test suite (units + integration)
        run: bash scripts/test-all.sh

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Use the gitleaks BINARY (the gitleaks-action requires a paid license for private orgs).
      - name: gitleaks
        run: |
          VER=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1
