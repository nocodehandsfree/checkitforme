name: CI

# Gate the app on its own checks. Tests boot against dummy env + throwaway SQLite DBs — no real secrets.
on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  test:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Store contract (carries must be served-derived, not the raw column)
        run: node scripts/check-store-contract.mjs

      - name: Full test suite (units + integration)
        run: bash scripts/test-all.sh

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Use the gitleaks BINARY (the gitleaks-action requires a paid license for private orgs).
      - name: gitleaks
        run: |
          VER=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1

  docs-lint:
    name: Checkpoint size (warn 80+, fail 120+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: checkpoint size — warn over 80, FAIL over 120
        run: |
          fail=0
          for f in docs/team/*/checkpoint.md; do
            n=$(wc -l < "$f")
            if [ "$n" -gt 120 ]; then
              echo "::error file=$f::$f is $n lines (hard cap 120) — Lexicon: prune it"
              fail=1
            elif [ "$n" -gt 80 ]; then
              echo "::warning file=$f::$f is $n lines (cap ~80) — Lexicon: prune it"
            fi
          done
          exit $fail
      - name: copy lint (warn) — banned tokens in user-facing HTML
        run: |
          for w in '—' 'Runnr' 'Fungie' 'Clerk'; do
            for f in public/checkit.html public/app.html; do
              grep -q -- "$w" "$f" && echo "::warning file=$f::banned copy token '$w' in $f (owner rule: no em-dashes, no dead brands)"
            done
          done
          exit 0
